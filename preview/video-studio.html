<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Nova Bladers — Video Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 640px;
      height: 360px;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #0a0e18;
      color: #e8ecf4;
    }
    .studio {
      width: 640px;
      height: 360px;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 10px 16px 6px;
      background: linear-gradient(180deg, #12182a, #0a0e18);
    }
    .header h1 { font-size: 15px; color: #4a9eff; font-weight: 800; }
    .header p { font-size: 11px; color: #8892a8; margin-top: 2px; }
    .arena-wrap { flex: 1; padding: 0 16px 12px; position: relative; }
    .arena {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 55%, #1a2238 0%, #0d1220 70%);
      border-radius: 12px;
      border: 2px solid #2a3348;
      overflow: hidden;
    }
    .arena::before {
      content: "";
      position: absolute;
      inset: 18% 12%;
      border: 2px dashed rgba(74,158,255,0.25);
      border-radius: 50%;
    }
    .phase-label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #4a9eff;
      z-index: 10;
      white-space: nowrap;
    }
    .callout {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 900;
      z-index: 12;
      text-shadow: 0 0 12px currentColor;
    }
    .bey-dot {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      box-shadow: 0 0 14px currentColor;
    }
    .target-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      right: 20%;
      top: 36%;
      background: #ff4466;
      opacity: 0.75;
      z-index: 2;
    }
    .fx { position: absolute; pointer-events: none; }
    .hud {
      position: absolute;
      bottom: 8px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #8892a8;
      z-index: 15;
    }
    .energy { color: #ffcc00; font-weight: 700; }
  </style>
</head>
<body>
  <div class="studio" id="studio">
    <div class="header">
      <h1 id="move-name">Nova Meteor Shower</h1>
      <p id="move-bey">Nova Striker · Special Move</p>
    </div>
    <div class="arena-wrap">
      <div class="arena" id="arena">
        <div class="phase-label" id="phase-label"></div>
        <div class="callout" id="callout"></div>
        <div class="target-dot"></div>
        <div class="bey-dot" id="bey-dot"></div>
        <div class="hud">
          <span>HP: 100 · RPM: 85</span>
          <span class="energy">⚡ ENERGY</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { getMove, renderMoveAtTime, moveDuration } from './specialMoves.js';

    const params = new URLSearchParams(location.search);
    const moveId = params.get('move') ?? 'NovaMeteorShower';
    const move = getMove(moveId);

    document.getElementById('move-name').textContent = move.name;
    document.getElementById('move-bey').textContent = `${move.bey} · Special Move`;
    document.getElementById('move-name').style.color = move.color;
    document.getElementById('phase-label').style.color = move.color;

    const bey = document.getElementById('bey-dot');
    bey.style.background = move.color;
    bey.style.color = move.color;

    const arena = document.getElementById('arena');
    const label = document.getElementById('phase-label');
    const callout = document.getElementById('callout');
    callout.textContent = `⚡ ${move.name}!`;
    callout.style.color = move.color;

    /** Called by Puppeteer for frame-perfect video rendering. */
    window.renderAt = (elapsed) => {
      const showCallout = elapsed < 0.6;
      callout.style.opacity = showCallout ? '1' : '0';
      return renderMoveAtTime(arena, label, move, elapsed);
    };

    window.getMoveDuration = () => moveDuration(move) + 0.4;
    window.getMoveId = () => move.id;
    window.__STUDIO_READY__ = true;

    if (params.get('preview') === '1') {
      let elapsed = 0;
      const tick = () => {
        elapsed += 1 / 60;
        window.renderAt(elapsed);
        if (elapsed < window.getMoveDuration()) requestAnimationFrame(tick);
      };
      tick();
    }
  </script>
</body>
</html>
